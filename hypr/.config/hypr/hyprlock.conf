###############################
# INPUT FIELD
###############################
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2

    dots_size = 0.26 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.64 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1

    rounding = 0
    outer_color = rgba(0, 0, 0, 0.2)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = $on_surface

    fade_on_empty = true
    placeholder_text = <i>Enter Password...</i> # Text rendered in the input box when it's empty.

    position = 0, 120
    halign = center
    valign = bottom
}

###############################
# CAPS LOCK
###############################
# Caps Lock Warning
label {
    monitor =
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/scripts/caps_lock.sh
    color = $primary
    font_size = 24
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, -100
    halign = center
    valign = center
}

###############################
# INFO
label {
    monitor =
    text = cmd[update:1000] echo -e "$(~/.config/hypr/scripts/battery_lock.sh)"

    color = rgba(255, 255, 255, 1)
    font_size = 12
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = -20, -510
    halign = right
    valign = center
}
