source = ./0_session/colors.conf
source = ./0_session/attributes.conf
$Scripts = $HOME/.config/hypr/scripts

# see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations

###############################
# GENERAL
###############################
general {
    grace = 1
    fractional_scaling = 2

    no_fade_in = true
    no_fade_out = true

    immediate_render = true
}

###############################
# BACKGROUND
###############################
background {
    monitor =
	path = $image

    # color = rgba(0, 0, 0, 0.0)

    blur_size = 1
    blur_passes = 1 # 0 disables blurring
    noise = 0.0117
    contrast = 1.3000 # Vibrant!!!
    brightness = 0.6000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}



###############################
# CLOCK
###############################
# Hours
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $primary
    font_size = 112
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    shadow_passes = 0
    shadow_size = 0

    position = 0, 220
    halign = center
    valign = center
}

# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $on_surface
    font_size = 112
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    shadow_passes = 0
    shadow_size = 0

    position = 0, 80
    halign = center
    valign = center
}

###############################
# DATE
###############################
# Today
label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color = $on_surface_variant
    font_size = 18
    font_family = JetBrains Mono Nerd Font Mono ExtraBold

    position = 0, -15
    halign = center
    valign = center
}

# Week
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color = $on_surface_variant
    font_size = 14
    font_family = JetBrains Mono Nerd Font Mono ExtraBold

    position = 0, -40
    halign = center
    valign = center
}


###############################
# LOCATION & WEATHER
###############################
label {
    monitor =
    text = cmd[update:1000] echo "$(curl -s 'wttr.in?format=%c+%C+%t' 2>/dev/null)"
    color = $on_surface
    font_size = 10
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, 465
    halign = center
    valign = center
}


###############################
# MUSIC PLAYER
###############################

image {
    monitor =
    path =
    size = 60 # lesser side if not 1:1 ratio
    rounding = 5 # negative values mean circle
    border_size = 0
    rotate = 0 # degrees, counter-clockwise
    reload_time = 2
    reload_cmd = ~/.config/hypr/scripts/playerctl_lock.sh --arturl
    position = -150, -300
    halign = center
    valign = center
    opacity=0.5

    zindex = 1
}

# PLAYER TITLE
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/playerctl_lock.sh --title)"
    color = $on_surface
    font_size = 12
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 880, -290
    halign = left
    valign = center

    zindex = 1
}

# PLAYER LENGTH
label {
    zindex = 1
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/playerctl_lock.sh --length) "
    color = $on_surface
    font_size = 11
    font_family = JetBrains Mono Nerd Font Mono
    position = -730, -310
    halign = right
    valign = center
}

# PLAYER STATUS
label {
    zindex = 1
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/playerctl_lock.sh --status)"
    color = $on_surface
    font_size = 14
    font_family = JetBrains Mono Nerd Font Mono
    position = -740, -290
    halign = right
    valign = center
}

# PLAYER SOURCE
label {
    zindex = 1
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/playerctl_lock.sh --source)"
    color = $on_surface_variant
    font_size = 10
    font_family = JetBrains Mono Nerd Font Mono
    position = -740, -330
    halign = right
    valign = center
}

# PLAYER ALBUM
label {
    zindex = 1
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/playerctl_lock.sh --album)"
    color = $on_surface
    font_size = 10
    font_family = JetBrains Mono Nerd Font Mono
    position = 880, -330
    halign = left
    valign = center
}

# PLAYER ARTIST
label {
    zindex = 1
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/playerctl_lock.sh --artist)"
    color = $primary
    font_size = 10
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 880, -310
    halign = left
    valign = center
}

