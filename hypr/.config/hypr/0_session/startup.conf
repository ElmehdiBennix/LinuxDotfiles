source = ./attributes.conf

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Autostart Configuration                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Autostart wiki https://wiki.hyprland.org/0.45.0/Configuring/Keywords/#executing

# exec-once = hyprpm reload -n

exec-once = uwsm app -- awww-daemon
exec-once = uwsm app -- awww restore

exec-once = uwsm app -- waybar
exec-once = uwsm app -- swaync

exec-once = uwsm app -- udiskie --tray
exec-once = uwsm app -- kdeconnect-indicator
exec-once = uwsm app -- mcontrolcenter

exec-once = uwsm app -- vicinae server
exec-once = uwsm app -- easyeffects --gapplication-service
exec-once = systemctl --user start hyprpolkitagent

exec-once = uwsm app -- hypridle
