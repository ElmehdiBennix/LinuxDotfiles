### CURSOR CONFIGURATION (Using envd for D-Bus/Systemd export)
envd = HYPRCURSOR_THEME,$cursorTheme
envd = HYPRCURSOR_SIZE,$cursorSize
envd = XCURSOR_THEME,$cursorTheme
envd = XCURSOR_SIZE,$cursorSize

### XDG COMPATIBILITY
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

### WAYLAND VARIABLES
env = SDL_VIDEODRIVER,wayland              # For games & apps using SDL2 (e.g., Steam, many indie games). # Forcing native Wayland on specific toolkits.
### NVIDIA ENV VARIABLES
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia

### VA-API HARDWARE VIDEO ACCELERATION
# env = NVD_BACKEND,direct                   # This is for the nvidia-vaapi-driver. compatibility on hybrid systems.

### WHICH GPU TO USE BY PRIORITY
# env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2

### WAYLAND APPLICATION SUPPORT
env = ELECTRON_OZONE_PLATFORM_HINT,auto    # For older Electron apps (Discord, etc.)
env = OZONE_PLATFORM,wayland               # For modern Chromium/Electron apps (VS Code, etc.)
env = MOZ_ENABLE_WAYLAND,1                 # For Firefox

### ADDITIONAL WAYLAND VARIABLES
# Forcing native Wayland on specific toolkits.
env = SDL_VIDEODRIVER,wayland              # For games & apps using SDL2 (e.g., Steam, many indie games).
env = CLUTTER_BACKEND,wayland              # For apps using the Clutter toolkit (e.g., older GNOME apps like Cheese, GNOME MPV).

env = ECORE_EVAS_ENGINE,wayland            # For apps from the Enlightenment desktop (e.g., Terminology terminal).
env = ELM_ENGINE,wayland                   # Also for Enlightenment apps.

### WAYLAND APPLICATION SUPPORT
env = ELECTRON_OZONE_PLATFORM_HINT,auto    # For older Electron apps (Discord, etc.)

env = OZONE_PLATFORM,wayland               # For modern Chromium/Electron apps (VS Code, etc.)
env = MOZ_DISABLE_RDD_SANDBOX,1            # Required for hardware video acceleration on NVIDIA
env = MOZ_ENABLE_WAYLAND,1                 # For Firefox

### GTK CONFIGURATION
env = GDK_BACKEND,wayland,x11              # Tells GTK apps to try Wayland first, then fall back to X11.
env = GDK_SCALE,1                          # Force XWayland Scaling fix If you use scaling (e.g., 1.25x), XWayland apps (like Steam/Spotify) will be blurry this helps fix that.

### QT CONFIGURATION : THEMING & FIXES
env = QT_QPA_PLATFORMTHEME,qt5ct             # Sets the theme engine for Qt5 apps.
env = QT_QPA_PLATFORMTHEME_QT6,qt6ct         # Sets the theme engine for Qt6 apps.
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1  # ESSENTIAL: Allows Hyprland to draw window borders for Qt apps.
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1




### NVIDIA & RENDERING OPTIMIZATIONS
# env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2            # WHICH GPU TO USE BY PRIORITY for an external display setup chose didicated gpu first else frame buffering will go to iGPU then hdmi port to display which will cause lag lspci and /dev/dri/by-path/ can help identify cards
# env = GBM_BACKEND,nvidia-drm                            # Required for NVIDIA stability on Wayland
# env = __VK_LAYER_NV_optimus,NVIDIA_only                 # Ensures Vulkan apps can find the dGPU
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia                  # Critical for OpenGL apps to see the RTX 3060

# VA-API HARDWARE VIDEO ACCELERATION
# env = LIBVA_DRIVER_NAME,nvidia                          # Use NVIDIA for VA-API
# env = NVD_BACKEND,direct                                # This is for the nvidia-vaapi-driver. compatibility on hybrid systems. Fixes video flickers in apps like Discord/Firefox
