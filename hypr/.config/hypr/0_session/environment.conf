source = ./attributes.conf

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Environment Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

### CURSOR CONFIGURATION
envd = HYPRCURSOR_THEME,$cursorTheme
envd = HYPRCURSOR_SIZE,$cursorSize
envd = XCURSOR_THEME,$cursorTheme
envd = XCURSOR_SIZE,$cursorSize

### NVIDIA ENV VARIABLES
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

### VA-API HARDWARE VIDEO ACCELERATION
env = NVD_BACKEND,direct                   # This is for the nvidia-vaapi-driver. compatibility on hybrid systems.

### WHICH GPU TO USE BY PRIORITY
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2

### WAYLAND APPLICATION SUPPORT
env = ELECTRON_OZONE_PLATFORM_HINT,auto    # For older Electron apps (Discord, etc.)
env = OZONE_PLATFORM,wayland               # For modern Chromium/Electron apps (VS Code, etc.)
env = MOZ_ENABLE_WAYLAND,1                 # For Firefox

### ADDITIONAL WAYLAND VARIABLES
# Forcing native Wayland on specific toolkits.
env = SDL_VIDEODRIVER,wayland              # For games & apps using SDL2 (e.g., Steam, many indie games).
env = CLUTTER_BACKEND,wayland              # For apps using the Clutter toolkit (e.g., older GNOME apps like Cheese, GNOME MPV).
env = ECORE_EVAS_ENGINE,wayland            # For apps from the Enlightenment desktop (e.g., Terminology terminal).
env = ELM_ENGINE,wayland                   # Also for Enlightenment apps.

### GTK CONFIGURATION
env = GDK_BACKEND,wayland,x11              # Tells GTK apps to try Wayland first, then fall back to X11.

### QT CONFIGURATION
env = QT_QPA_PLATFORMTHEME,qt5ct             # Sets the theme engine for Qt5 apps.
env = QT_QPA_PLATFORMTHEME_QT6,qt6ct         # Sets the theme engine for Qt6 apps.
env = QT_QPA_PLATFORM,wayland;xcb            # Tells Qt apps to try Wayland first, then fall back to X11 (xcb).
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1  # ESSENTIAL: Allows Hyprland to draw window borders for Qt apps.
