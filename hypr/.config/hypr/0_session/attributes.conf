source = ./colors.conf

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃   GLOBAL VARIABLES & CONSTANTS                              ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

$lockscreen = hyprlock
$idlehandler = hypridle

$notification = swaync -c
$capturing = hyprshot
$menu = rofi

$filemanager = nautilus
$terminal = kitty
$browser = zen-browser
$editor = code

$scriptsDir =
$wallpaperDir = ~/Pictures/Wallpapers
$screenshotDir = ~/Pictures/Screenshots

# THEME VARIABLES
$cursorTheme = Adwaita
$cursorSize = 10
$fontFamily = SF Pro
$fontMono = Liga SFMono Nerd Font

# LAYOUT CONSTANTS
$gapsIn = 6
$gapsOut = 12
$borderSize = 1
$rounding = 0

# OPACITY VALUES
$opacityActive = 1.0
$opacityInactive = 0.8
$opacityFloat = 0.90
$opacitySpecial = 0.6

# TIMEOUT VALUES (in seconds)
$timeoutDim = 300 # 5 minutes
$timeoutLock = 600 # 10 minutes
$timeoutScreen = 900 # 15 minutes
$timeoutSuspend = 1200 # 20 minutes
