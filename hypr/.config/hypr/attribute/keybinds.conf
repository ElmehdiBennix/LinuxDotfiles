# ┃                         Keybinds                            ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# https://wiki.hyprland.org/Configuring/Binds

source = ~/.config/hypr/attribute/defaults.conf

####################################################################################
#  binds Settings
####################################################################################

$mainMod = SUPER
$reverse = SHIFT

binds {
    allow_workspace_cycles = 1
    workspace_back_and_forth = 1
    workspace_center_on = 1
    movefocus_cycles_fullscreen = true
    window_direction_monitor_fallback = true
}

####################################################################################
# system control
####################################################################################

### volume control
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5% # Lower Volume
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5% # Lower Volume
bindel = , XF86AudioMute, exec, amixer sset Master toggle | sed -En '/\[on\]/ s/.*\[([0-9]+)%\].*/\1/ p; /\[off\]/ s/.*/0/p' | head -1 > /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob	#Mutes player audio

### Playback Control
bindd = , XF86AudioPlay, Toggles play/pause, exec, playerctl play-pause
bindd = , XF86AudioNext, Next track, exec, playerctl next
bindd = , XF86AudioPrev, Previous track, exec, playerctl previous

### Screen Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl s +5% #Increases brightness 5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%- #Decreases brightness 5%

####################################################################################
# Shell and command actions
####################################################################################

bindd = $mainMod, L, Lock the screen, exec, $lockscreen
bindd = $mainMod SHIFT, L, Exits Hyprland by terminating the user sessions, exec, loginctl terminate-user ""

bindd = $mainMod SHIFT, R, Reload/restarts Waybar, exec, killall -SIGUSR2 waybar
# bindd = $mainMod , N, Reload/restarts Waybar, exec, swaync -t
# bindd = $mainMod SHIFT, N, Reload/restarts Waybar, exec, swaync -t

bindd = $mainMod, RETURN, Opens your preferred terminal emulator ($terminal), exec, $terminal
bindr = $mainMod, SPACE, exec, pkill rofi || rofi -show drun
bindd = $mainMod, E, Opens your preferred filemanager ($filemanager), exec, $filemanager
# bindd = $mainMod, A, Screen capture selection, exec, $capturing

####################################################################################
# basic control features
####################################################################################

bindd = $mainMod, Q, Closes (not kill) current window, killactive,

# Toggles curren window to split mode
bind = $mainMod, J, togglesplit,
bind = $mainMod, mouse:275, togglesplit,

### switch between windows in a floating workspace
bind = ALT, Tab, cyclenext, visible # change focus to another window
bind = ALT, Tab, alterzorder, top     # bring it to the top

### Pin current window (shows on all workspaces only floating)
bind = $mainMod, P, pin
bind = $mainMod, mouse:276, pin

### Switches current window between floating and tiling mode,
bind = $mainMod, V, togglefloating,
bind = $mainMod, mouse:274, togglefloating,

### Toggles current window fullscreen
bindd = $mainMod, F, mode partial, fullscreen, 1
bindd = $mainMod SHIFT, F, mode fully, fullscreen, 0

### Special workspaces (scratchpads)
bindd = $mainMod, S, Toggles the Special workspace, togglespecialworkspace, special
bindd = $mainMod SHIFT, S, Move active window to Special workspace, movetoworkspace,special

### Grouping Windows
bindd = $mainMod, T, Toggles current window group mode (ungroup all related), togglegroup,
bindd = $mainMod, Tab, Switches to the next window in the group, changegroupactive, f

####################################################################################
#  Window Actions
####################################################################################

### Move focus with mainMod + arrow keys
bindd = $mainMod, left, Move focus to the left, movefocus, l
bindd = $mainMod, right,  Move focus to the right, movefocus, r
bindd = $mainMod, up, Move focus upwards, movefocus, u
bindd = $mainMod, down, Move focus downwards, movefocus, d

### Move window towards a direction
bindd = $mainMod SHIFT, left, Move active window to the left, movewindoworgroup, l
bindd = $mainMod SHIFT, right, Move active window to the right, movewindoworgroup, r
bindd = $mainMod SHIFT, up, Move active window upwards, movewindoworgroup, u
bindd = $mainMod SHIFT, down, Move active window downwards, movewindoworgroup, d

### Resize window with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow	#Drag window
bindm = $mainMod, mouse:273, resizewindow	#Resize the window towards a direction

