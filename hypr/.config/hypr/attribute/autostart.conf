# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Autostart Configuration                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/attribute/defaults.conf

## Autostart wiki https://wiki.hyprland.org/0.45.0/Configuring/Keywords/#executing #
exec-once = bash -c "mkfifo /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob && tail -f /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob | wob -c ~/.config/hypr/wob.ini & disown" &


exec-once = hyprpm reload -n

exec-once = swww-daemon &
exec-once = swww restore

exec-once = waybar &
exec-once = swaync &

exec-once = mcontrolcenter &
exec-once = keepassxc --minimized &
exec-once = blueman-applet
exec-once = nm-applet --indicator

exec-once = vicinae server &
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1


## Slow app launch fix
exec-once = systemctl --user import-environment &
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = dbus-update-activation-environment --systemd &

exec-once = udiskie --tray
exec-once = easyeffects --gapplication-service

# exec-once = hyprctl setcursor Bibata-Modern-Classic 24

## Idle configurationz
exec-once = $idlehandler &
