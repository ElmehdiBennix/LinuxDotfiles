# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Animations Configuration                 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# https://wiki.hyprland.org/0.45.0/Configuring/Animations/

animations {
    enabled = true

    # Carefully crafted bezier curves for natural movement
    bezier = wind, 0.05, 0.9, 0.1, 1.0
    bezier = winIn, 0.1, 1.0, 0.1, 1.0
    bezier = winOut, 0.3, 0.0, 0, 1
    bezier = liner, 1, 1, 1, 1

    # Window opening, closing, and moving
    animation = windows, 1, 8, wind, slide
    animation = windowsIn, 1, 8, winIn, slide
    animation = windowsOut, 1, 7, winOut, slide
    animation = windowsMove, 1, 7, wind, slide

    # Fading for menus and popups
    animation = fade, 1, 5, wind
    animation = fadeIn, 1, 5, winIn
    animation = fadeOut, 1, 5, winOut
    animation = fadeSwitch, 1, 6, wind
    animation = fadeDim, 1, 5, wind

    # Workspaces: Fast & Fluid
    animation = workspaces, 1, 7, wind, slidevert
    animation = specialWorkspace, 1, 5, wind, slidefade

    # Border animations for visual feedback
    animation = border, 1, 3, liner
    animation = borderangle, 1, 45, liner, loop

    # Smooth layer transitions
    animation = layers, 1, 4, wind, fade
    animation = layersIn, 1, 4, winIn, fade
    animation = layersOut, 1, 4, winOut, slide
}
