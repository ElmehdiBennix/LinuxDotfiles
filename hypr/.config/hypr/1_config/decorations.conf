# ┃                    Decorations Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ./../0_session/attributes.conf

# https://wiki.hyprland.org/0.45.0/Configuring/Variables/#decoration

cursor {
    no_hardware_cursors = false
}

decoration {
    active_opacity = 1
    rounding = $rounding
    rounding_power = 2    
    dim_special = 0.3

    # https://wiki.hyprland.org/0.45.0/Configuring/Variables/#blur
    blur {
        enabled = true
        new_optimizations = on
        ignore_opacity = on
        size = 3
        passes = 2 # resource heavy at higher
        vibrancy = 0.1696
        xray = true
    }


    # https://wiki.hyprland.org/0.45.0/Configuring/Variables/#shadow
    shadow {
      enabled = true
      range = 4
      render_power = 3
      color = rgba(1a1a1aee)
    }
}
