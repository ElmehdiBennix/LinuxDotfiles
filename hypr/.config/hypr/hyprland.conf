source = ./0_session/startup.conf

source = ./2_keybinds/__CORE__.conf

source = ./1_config/animations.conf
source = ./1_config/decorations.conf
source = ./1_config/input.conf
source = ./1_config/variables.conf

source = ./3_rules/__CORE__.conf

# source = ./1_config/plugins.conf

source = ./monitors.conf

exec-once = uwsm app -- xwaylandvideobridge

# xwaylandvideobridge configuration (using modern block syntax for v0.45.0+)
windowrule {
    name = xwayland-bridge
    match:initial_class = ^(xwaylandvideobridge)$
    opacity = 0.0
    no_anim = true
    no_initial_focus = true
    no_focus = true
    no_blur = true
    float = on
    size = 1 1
}
