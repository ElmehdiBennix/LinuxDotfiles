# Waybar Styling
layerrule {
    name = Waybar
    match:namespace = ^(waybar)$

    blur = on
    blur_popups = on
    xray = off

    animation = slide down
    # order = 1
}

# Notification Center (SwayNC)
layerrule {
    name = SwayNC
    match:namespace = ^(swaync-control-center|swaync-notification-window)$

    blur = on
    blur_popups = on
    ignore_alpha = 0.1
    xray = off

    no_anim = true
    animation = none

    # order = 2
}

# Vicinae Logic
layerrule {
    name = Vicinae
    match:namespace = ^(vicinae)$

    blur = on

    ignore_alpha = 0.1


    xray = off
    no_anim = true
    # animation = gnomed

    # order = 1
}
