
# noctalia
layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$

  ignore_alpha = 0.5
  blur = true
  blur_popups = true

}


# vicinae menu
layerrule {
    name = vicinae
    match:namespace = vicinae

    blur = on
    blur_popups = on
    ignore_alpha = 0
    xray = off

    no_anim = true
}
