# Waybar Styling
layerrule {
    name = Waybar
    match:namespace = ^(waybar)$

    blur = on
    blur_popups = on
    xray = off
    animation = slide down
}

# Rofi Overlay
layerrule {
    name = Rofi
    match:namespace = ^(rofi)$

    blur = on
    dim_around = 0.5
    # ignore_zero = on
    ignore_alpha = 0.9
    animation = none
}

# Notification Center (SwayNC)
layerrule {
    name = SwayNC
    match:namespace = ^(swaync-control-center|swaync-notification-window)$

    blur = on
    ignore_alpha = 1
    xray = off
    animation = none
}

# Vicinae & Logout Logic
layerrule {
    name = Vicinae & Logout
    match:namespace = ^(vicinae)$

    blur = on
    ignore_alpha = 1
    xray = off
    animation = none
}
