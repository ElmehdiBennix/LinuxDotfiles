######################################
# LAYER RULES
####################################

#
layerrule = blur,rofi
layerrule = xray 1,rofi
layerrule = dimaround,rofi
layerrule = ignorezero,rofi
layerrule = ignorealpha 0.9,rofi

#
layerrule = blur, logout_dialog
# layerrule = ignorezero,  logout_dialog
# layerrule = xray 0, logout_dialog
# layerrule = blurpopups, logout_dialog
# layerrule = dimaround, logout_dialog
# layerrule = animation slide down,  logout_dialog

#
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-notification-window
layerrule = xray 0, swaync-notification-window

#
layerrule = blur, swaync-control-center
layerrule = ignorezero, swaync-control-center
layerrule = xray 0, swaync-control-center
layerrule = noanim, swaync-control-center

#
layerrule = blur,waybar
layerrule = ignorezero, waybar
layerrule = xray 0,waybar
layerrule = blurpopups,waybar
