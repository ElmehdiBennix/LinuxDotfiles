# Optimized v0.53.0 Block Rules

# System & Authentication Portals
windowrule {
    name = system-portals
    match:initial_class = ^(xdg-desktop-portal-.*|polkit-gnome-authentication-agent-1|hyprpolkitagent|org.kde.polkit-kde-authentication-agent-1)$
    float = on
    center = on
}

# Core Utility Windows
windowrule {
    name = quick-utilities
    match:initial_class = ^(org.pulseaudio.pavucontrol|blueman-manager|nm-connection-editor)$
    float = on
    size = 800 600
    center = on
    pin = on
    animation = gnomed
}

# Media Viewers
windowrule {
    name = media-view
    match:initial_class = ^(com.interversehq.qView|mpv)$
    float = on
    size = 1150 650
    center = on
    animation = popin
}

# Configuration Tools (nwg-displays compatible)
windowrule {
    name = config-tools
    match:initial_class = ^(qt[56]ct|nwg-look|nwg-displays|CachyOSHello|org.cachyos.scx-manager|org.cachyos.KernelManager|org.keepassxc.KeePassXC|org.manjaro.pamac.manager|com.github.wwmm.easyeffects)$
    float = on
    size = 1200 800
    center = on
}

# Picture-in-Picture (Title Match)
windowrule {
    name = pip-global
    match:title = .*(Picture-in-Picture|Picture in Picture).*
    float = on
    pin = on
    size = 480 270
    move = 74.5% 4.25%
    animation = popin
}

# Specific Browser Rules
windowrule = match:initial_class ^(zen)$, match:initial_title ^(Connexion : comptes Go
