####################################################################################
#  Workspace Actions
####################################################################################

### Switch workspaces with mainMod + [0-9]
bindd = $mainMod, 1, Switch to workspace 1, workspace, 1
bindd = $mainMod, 2, Switch to workspace 2, workspace, 2
bindd = $mainMod, 3, Switch to workspace 3, workspace, 3
bindd = $mainMod, 4, Switch to workspace 4, workspace, 4
bindd = $mainMod, 5, Switch to workspace 5, workspace, 5
bindd = $mainMod, 6, Switch to workspace 6, workspace, 6
bindd = $mainMod, 7, Switch to workspace 7, workspace, 7
bindd = $mainMod, 8, Switch to workspace 8, workspace, 8
bindd = $mainMod, 9, Switch to workspace 9, workspace, 9

## Move window silently to workspace
bind = $mainMod $reverse, 1, movetoworkspacesilent, 1
bind = $mainMod $reverse, 2, movetoworkspacesilent, 2
bind = $mainMod $reverse, 3, movetoworkspacesilent, 3
bind = $mainMod $reverse, 4, movetoworkspacesilent, 4
bind = $mainMod $reverse, 5, movetoworkspacesilent, 5
bind = $mainMod $reverse, 6, movetoworkspacesilent, 6
bind = $mainMod $reverse, 7, movetoworkspacesilent, 7
bind = $mainMod $reverse, 8, movetoworkspacesilent, 8
bind = $mainMod $reverse, 9, movetoworkspacesilent, 9

##
binde = $mainMod, PAGE_UP, workspace, e-1
binde = $mainMod, PAGE_DOWN, workspace, e+1

##
bindde = $mainMod $reverse, PAGE_UP, Move window and switch to the next workspace, movetoworkspace, -1
bindde = $mainMod $reverse, PAGE_DOWN, Move window and switch to the previous workspace, movetoworkspace, +1

##
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

##
bindd = $mainMod $reverse, mouse_down, Move window and switch to the next workspace, movetoworkspace, -1
bindd = $mainMod $reverse, mouse_up, Move window and switch to the previous workspace, movetoworkspace, +1

## swipe 3 finders down or up
