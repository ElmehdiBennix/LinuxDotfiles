# --- MONITOR CONFIG ---
# Create a virtual 1080p display
monitor=headless-0,1920x1080@60,0x0,1

# Explicitly disable the physical laptop screen
monitor=eDP-1,disable

# --- BACKEND SETTINGS ---
# Force headless mode and ignore physical mouse/keyboard
env = WLR_BACKENDS,headless
env = WLR_LIBINPUT_NO_DEVICES,1

# --- ESSENTIALS ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# --- AUTOSTART ---
# Start Sunshine inside this virtual session
exec-once = sunshine
