# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃              THINKPAD HARDWARE SPECIFIC (INTEL)             ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# --- MONITOR ---
# The T14s often has a 16:10 or HiDPI screen. Auto-scale is safer.
monitor=eDP-1, preferred, auto, 1.25

# --- INTEL SPECIFIC ---
# iHD is the modern Intel VA-API driver for CometLake/Iris Xe
env = LIBVA_DRIVER_NAME,iHD
env = MESA_LOADER_DRIVER_NAME,iris

# --- POWER SAVING ---
# Helps with battery on the ThinkPad
env = INTEL_DEBUG,noccs
