<* for name, value in colors *>
$image = {{image}}
${{name}} = rgba({{value.default.hex_stripped}}ff)
<* endfor *>

# Transparent variants (for UI elements like groupbar)
$surface_container_high_transparent = rgba({{colors.surface_container_high.default.hex_stripped}}cc)
$surface_container_transparent = rgba({{colors.surface_container.default.hex_stripped}}30)
$on_surface_variant_light = rgba(ffffff99)
