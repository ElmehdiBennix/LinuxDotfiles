


[templates.waybar]
input_path = './templates/colors.css'
output_path = '~/.config/waybar/colors.css'
post_hook = 'pkill -SIGUSR2 waybar'

[templates.hyprland]
input_path = './templates/colors.css'
output_path = '~/.config/hypr/colors.conf'
post_hook = 'hyprctl reload'




[templates.rofi]
input_path = './templates/colors.css'
output_path = '~/.config/rofi/colors.rasi'




[templates.kitty]
input_path = './templates/colors.css'
output_path = '~/.config/kitty/colors.conf'
post_hook = 'pkill -SIGUSR1 kitty'

[templates.vesktop]
input_path = './templates/colors.css'
output_path = '~/.config/vesktop/themes/midnight-discord.css'




[config]
reload_apps = true

[config.wallpaper]
command = "swww"
arguments = [ "img", "-t", "outer", "--transition-duration", "1.5", "--transition-step", "255", "--transition-fps", "60", "-f", "Nearest",]
set = true

[templates.gtk3]
input_path = '~/.config/matugen/templates/breeze-gtk.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme Breeze'

[templates.gtk4]
input_path = '~/.config/matugen/templates/breeze-gtk.css'
output_path = '~/.config/gtk-4.0/colors.css'


[templates.color-scheme]
input_path = '~/.config/matugen/templates/Matugen.colors'
output_path = '~/.local/share/color-schemes/Matugen.colors'
post_hook = '~/.config/matugen/reload-qt.sh &'


[config.custom_colors.red]
color = "#FF0000"
blend = true

[config.custom_colors.green]
color = "#00FF00"
blend = true

[config.custom_colors.yellow]
color = "#FFFF00"
blend = true

[config.custom_colors.blue]
color = "#0000FF"
blend = true

[config.custom_colors.magenta]
color = "#FF00FF"
blend = true

[config.custom_colors.cyan]
color = "#00FFFF"
blend = true

[config.custom_colors.white]
color = "#FFFFFF"
blend = true
