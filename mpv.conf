# ~/.config/mpv/mpv.conf

# Loop forever (great for GIFs)
loop=yes

# Keep the window open after playback
keep-open=yes

# Don’t quit on idle (lets you drag/drop a new file)
idle=yes

# Scale the window to video size at start
geometry=50%:50%
autofit-larger=90%x90%

# Use Wayland (if you’re on Hyprland)
vo=gpu
gpu-context=wayland

# Subtitle & OSD tweaks
sub-font-size=36
osd-level=1

# Screenshot directory
screenshot-directory=~/Pictures/mpv-shots
screenshot-format=png

replace=force 
