# ==============================================================================
#   ZELLIJ-LIKE TMUX CONFIGURATION (FINAL PRO EDITION)
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. CORE SYSTEM SETTINGS
# ------------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -s escape-time 0           # Vital for Vim/Neovim
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g status-interval 1
setw -g aggressive-resize on   # Useful when using grouped sessions

# ------------------------------------------------------------------------------
# 2. STATUS BAR (MODE INDICATOR)
# ------------------------------------------------------------------------------
set -g status-style bg=black,fg=white
set -g status-left-length 50

# Logic: Green=Normal, Red=Locked, Blue=Resize/Tab
set -g status-left '#[fg=black,bg=green,bold] #{?#{==:#{client_key_table},root}, NORMAL ,#[fg=black,bg=red,bold] #{client_key_table} } '

set -g status-right '#[fg=cyan] ❐ #S  #[fg=white] %H:%M '
setw -g window-status-current-format " #[fg=black,bg=yellow,bold] #I:#W "
setw -g window-status-format " #[fg=white,bg=black] #I:#W "

# ------------------------------------------------------------------------------
# 3. SMART PANE MANAGEMENT (Auto-Organized)
# ------------------------------------------------------------------------------

# -- Auto-Organized New Pane (Alt + n) --
# This splits the window and immediately reapplies the 'tiled' layout.
# 2 Panes -> Side by Side
# 3 Panes -> 1 Left, 2 Right (stacked)
# 4 Panes -> 2x2 Grid
bind -n M-n split-window -h -c "#{pane_current_path}" \; select-layout tiled

# -- Manual Split (Vertical) --
# Just in case you need a manual stack without re-organizing
bind -n M-v split-window -v -c "#{pane_current_path}"

# -- Zooming (Alt + = / Alt + -) --
bind -n M-= resize-pane -Z   # Zoom (Maximize)
bind -n M-- resize-pane -Z   # Unzoom (Restore) - (Tmux uses toggle for both)

# -- Layout Cycling --
bind -n M-] next-layout      # Cycle forward through layouts
bind -n M-[ previous-layout  # Cycle backward through layouts

# ------------------------------------------------------------------------------
# 4. PANE NAVIGATION & MOVEMENT
# ------------------------------------------------------------------------------

# -- Move Focus (Alt + Arrows / hjkl) --
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# -- Move/Swap Pane (Alt + Shift + Arrows / hjkl) --
# Moves the current pane to swap places with the neighbor
bind -n M-S-Left swap-pane -s '{left-of}'
bind -n M-S-Right swap-pane -s '{right-of}'
bind -n M-S-Up swap-pane -s '{up-of}'
bind -n M-S-Down swap-pane -s '{down-of}'
bind -n M-H swap-pane -s '{left-of}'
bind -n M-L swap-pane -s '{right-of}'
bind -n M-K swap-pane -s '{up-of}'
bind -n M-J swap-pane -s '{down-of}'

# ------------------------------------------------------------------------------
# 5. TAB (WINDOW) MANAGEMENT
# ------------------------------------------------------------------------------

# -- New Tab --
bind -n M-t new-window -c "#{pane_current_path}"

# -- Navigation (Alt + PageUp/Down) --
# NOTE: If this doesn't work, your terminal might be capturing these keys.
bind -n M-PageUp previous-window
bind -n M-PageDown next-window

# -- Navigation Fallback (Alt + , / Alt + .) --
# Try these if PageUp/Down fail
bind -n M-, previous-window
bind -n M-. next-window

# -- Direct Navigation (Alt + Number) --
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ------------------------------------------------------------------------------
# 6. MODAL BINDINGS (Resize, Locked, Scroll)
# ------------------------------------------------------------------------------

# -- RESIZE MODE (Alt + r) --
bind -n M-r switch-client -T resize
bind -T resize h resize-pane -L 5
bind -T resize j resize-pane -D 5
bind -T resize k resize-pane -U 5
bind -T resize l resize-pane -R 5
bind -T resize Left resize-pane -L 5
bind -T resize Down resize-pane -D 5
bind -T resize Up resize-pane -U 5
bind -T resize Right resize-pane -R 5
bind -T resize Escape switch-client -T root
bind -T resize Enter switch-client -T root

# -- SCROLL / COPY MODE (Ctrl + s) --
bind -n C-s copy-mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# -- LOCKED MODE (Ctrl + g) --
# Only Ctrl+g works in this mode. All other keys pass to the terminal.
bind -n C-g switch-client -T locked
bind -T locked C-g switch-client -T root

# ------------------------------------------------------------------------------
# 7. MAINTENANCE
# ------------------------------------------------------------------------------
bind -n M-R source-file ~/.tmux.conf \; display "Config Reloaded!"
