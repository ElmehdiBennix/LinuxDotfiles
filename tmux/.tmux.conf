# ------------------------------------------------------------------------------
# CORE SYSTEM SETTINGS
# ------------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

set -g mouse on                                                     # Enable mouse for scrolling, clicking, and resizing
set -g set-clipboard on                                             # Link tmux copy buffer to system clipboard
set -g base-index 1                                                 # Start window numbering at 1 instead of 0
setw -g pane-base-index 1                                           # Start pane numbering at 1 instead of 0
set -g renumber-windows on                                          # Automatically re-index windows when one is closed
set -s escape-time 0                                                # Remove delay for Escape key (instant Vim mode switching)
set -g history-limit 50000                                          # Increase scrollback buffer to 50,000 lines
set -g focus-events on                                              # Allow apps (like Vim) to detect terminal focus
set -g status-interval 5                                            # Refresh status bar every second (useful for clocks)
setw -g aggressive-resize on                                        # Resize windows based on active viewer's screen size
set -g status-keys emacs                                            # Emacs key bindings in tmux command prompt (prefix + :)
set -g display-time 2000                                            # Increase tmux messages display duration from 750ms to 4s

# ------------------------------------------------------------------------------
# core config
# ------------------------------------------------------------------------------

# keybinds for prefix
unbind C-b
set -g prefix C-space
bind-key C-space send-prefix

# reload config
unbind r
bind r source-file $HOME/.tmux.conf \; display "Config Reloaded!"

# ------------------------------------------------------------------------------
# session management
# ------------------------------------------------------------------------------

# 1. Remove kill confirmation (requires tmux 3.5+)
bind-key s choose-tree -Zs -y
bind-key w choose-tree -Zw -y

# 2. Rename (r) - Fixes the "Unknown Command" error
bind-key -T root r if-shell -F "#{==:#{pane_mode},tree-mode}" \
    "command-prompt -p 'Rename session:' 'rename-session \"%%\"'" \
    "send-keys r"

# 3. New Session (n) - Prompt for name and create
bind-key -T root n if-shell -F "#{==:#{pane_mode},tree-mode}" \
    "command-prompt -p 'New session name:' 'new-session -s \"%%\"'" \
    "send-keys n"

# ------------------------------------------------------------------------------
# WINDOW NAVIGATION & MOVEMENT
# ------------------------------------------------------------------------------

# -- New Tab --
bind -n C-n new-window -c "#{pane_current_path}"

# -- cycle recent --
bind -n C-Tab last-window

# -- Navigating tabs (Control + PageUp/Down) --
bind -n C-PageUp previous-window
bind -n C-PageDown next-window

# --  Navigating move (Control + shift + PageUp/Down)
bind -n C-S-PageUp swap-window -t -1 \; previous-window
bind -n C-S-PageDown swap-window -t +1 \; next-window

# -- Direct Navigation (Alt + Number) --
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ------------------------------------------------------------------------------
# PANE NAVIGATION & MOVEMENT
# ------------------------------------------------------------------------------

# -- Auto-Organized New Pane (Alt + n) --
bind -n M-n split-window -h -c "#{pane_current_path}" \; select-layout main-vertical

# -- Move Focus (Alt + Arrows / hjkl) --
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
#
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# -- Move/Swap Pane (Alt + Shift + Arrows) --
bind -n M-S-Left  swap-pane -d -t '{left-of}'
bind -n M-S-Right swap-pane -d -t '{right-of}'
bind -n M-S-Up    swap-pane -d -t '{up-of}'
bind -n M-S-Down  swap-pane -d -t '{down-of}'
#
bind -n M-S-H swap-pane -d -t '{left-of}'
bind -n M-S-L swap-pane -d -t '{right-of}'
bind -n M-S-K swap-pane -d -t '{up-of}'
bind -n M-S-J swap-pane -d -t '{down-of}'

# -- Layout Cycling --
bind -n M-] next-layout      # Cycle forward through layouts
bind -n M-[ previous-layout  # Cycle backward through layouts

# ------------------------------------------------------------------------------
# ZOOM BINDING
# ------------------------------------------------------------------------------

# -- Zooming (control + = / control + -) --
bind -n C-= resize-pane -Z   # Zoom (Maximize)
bind -n C-- resize-pane -Z   # Unzoom (Restore) - (Tmux uses toggle for both)

# ------------------------------------------------------------------------------
# SELECTION MODE BINDINGS
# ------------------------------------------------------------------------------

# Use Vi keys in copy mode
setw -g mode-keys vi

# 0. Entry: Press Prefix + v to enter copy mode
bind v copy-mode

# 1. Normal Visual Mode: Press 'v' to begin selection (standard Vim)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# 2. Visual Block Mode: Press 'C-v' to toggle rectangle (standard Vim)
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# 3. Visual Line Mode: Press 'V' (Shift-v) to select the whole line
bind-key -T copy-mode-vi V send-keys -X select-line

# 4. Yank: Press 'y' to copy and exit
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# 5. Escape: Exit selection mode
bind-key -T copy-mode-vi Escape send-keys -X cancel

# ------------------------------------------------------------------------------
# STATUS BAR (FIXED 2-LINE GAP)
# ------------------------------------------------------------------------------

# -- General Bar Settings --
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default"
set -g window-status-separator " "

# -- Bar GAP settings --
set -g status 2
set -g 'status-format[0]' ''
set -g 'status-format[1]' "#[align=left]#{E:status-left}#[align=left]#{W:#{E:window-status-format} ,#{E:window-status-current-format} }#[align=right]#{E:status-right}"

# -- Left Side (Dynamic Prefix) --
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[fg=colour1]#[bg=default]#[fg=black]#[bg=colour1]#[bold]   #[fg=colour1]#[bg=default],#[fg=colour4]#[bg=default]#[fg=black]#[bg=colour4]#[bold]   #[fg=colour4]#[bg=default]} "

# -- Window Status Tabs --
set -g window-status-format "#[fg=colour8,bg=default]#[fg=black,bg=colour8] #I: #W #[fg=colour8,bg=default]"
set -g window-status-current-format "#[fg=colour2,bg=default]#[fg=black,bg=colour2,bold] #I: #W #[fg=colour2,bg=default]"

# -- Right Side (Merged Session & Directory Pill) --
set -g status-right-length 100
set -g status-right "#[fg=colour8,bg=default]#[fg=black,bg=colour8,bold]  #S #[fg=black,bg=colour4,bold]   #{b:pane_current_path} #[fg=colour4,bg=default]"

# PANE BORDERS & COMMAND LINE
setw -g pane-border-status off
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour2"
set -g message-style "bg=black,fg=colour2,bold"

# ------------------------------------------------------------------------------
# 1. AUTOMATIC TPM INSTALLATION (Bootstrap)
# ------------------------------------------------------------------------------

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# ------------------------------------------------------------------------------
# 2. PLUGIN LIST # control + i to install plugins
# ------------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'fcsonline/tmux-thumbs'

# ------------------------------------------------------------------------------
# 3. PLUGIN CONFIGURATION & BINDINGS
# ------------------------------------------------------------------------------

# --- Continuum & Resurrect ---
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-strategy-nvim 'session'

# --- tmux-fzf-url ---
set -g @fzf-url-fzf-options "-p 75%,80% --layout=reverse --prompt=' : ' --border-label=' Url Picker ' --multi --preview 'curl -sIL --max-time 3 -A \"Mozilla/5.0\" {2} || echo \"Unreachable...\"' --preview-window=right:60%:wrap"

# --- Thumbs ---
run-shell "~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux"

set -g @thumbs-contrast 1
set -g @thumbs-reverse on
set -g @thumbs-unique on
set -g @thumbs-position off_left

set -g @thumbs-command 'tmux set-buffer -w -- "{}"'
set -g @thumbs-multi-command 'tmux set-buffer -w -- "{}"'

# ------------------------------------------------------------------------------
# 4. INITIALIZE TPM (Must be the very last line)
# ------------------------------------------------------------------------------

run '~/.tmux/plugins/tpm/tpm'
